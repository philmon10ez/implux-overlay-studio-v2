# Railway / Nixpacks: force Node 20 (Web Crypto for Shopify API). Do not commit node_modules.
[variables]
NODE_VERSION = "20"

[phases.setup]
nixPkgs = ["nodejs_20", "npm"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node node_modules/prisma/build/index.js generate && HOST=0.0.0.0 node node_modules/@remix-run/serve/dist/cli.js ./build/server/index.js"
